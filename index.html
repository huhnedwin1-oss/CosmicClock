<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Seesaw Chess Clock</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bodymovin/5.12.2/lottie.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="liquid-bg"></div>

    <div id="menu-overlay">
        <div class="grid" id="preset-grid">
            <button class="preset-btn" data-time="1" data-inc="0">1 | 0</button>
            <button class="preset-btn" data-time="2" data-inc="1">2 | 1</button>
            <button class="preset-btn" data-time="3" data-inc="0">3 | 0</button>
            <button class="preset-btn" data-time="3" data-inc="2">3 | 2</button>
            <button class="preset-btn" data-time="5" data-inc="0">5 | 0</button>
            <button class="preset-btn" data-time="5" data-inc="3">5 | 3</button>
            <button class="preset-btn" data-time="10" data-inc="0">10 | 0</button>
            <button class="preset-btn" data-time="15" data-inc="10">15 | 10</button>
            <button class="preset-btn" id="customBtn">...</button>
        </div>
    </div>

    <div id="clock-container">
        <div id="player2" class="clock-side">00:00</div>
        
        <div id="center-controls" style="display: none;">
            <button id="playBtn" class="action-btn">▶</button>
            <button id="pauseBtn" class="action-btn">❚❚</button>
            <button id="stopBtn" class="action-btn">■</button>
        </div>

        <div id="player1" class="clock-side active">00:00</div>
    </div>

    <script src="app.js"></script>
</body>
</html>
